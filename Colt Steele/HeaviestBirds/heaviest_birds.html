<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heaviest Birds Table</title>
</head>

<body>
    <h1>Heaviest Birds</h1>
    <table>
        <thead>
            <tr>
                <th rowspan="2">Bionomial Name</th>
                <th colspan="2">Mass Estimate</th>
                <th rowspan="2">Family</th>
                <th rowspan="2">Geological Name</th>
            </tr>
            <tr>
                <th></th>
                <th></th>
                <th>kg</th>
                <th>lbs</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Aepyornis maximus</td>
                <td>812 kg</td>
                <td>1,790 lb</td>
                <td>Aepyornithidae (greater elephant birds)</td>
                <td>Late Pleistocene-Holocene</td>
            </tr>
            <tr>
                <td>Dromornis stirtoni</td>
                <td>491 kg</td>
                <td>1,082 lb</td>
                <td>Anseriformes (waterfowl)</td>
                <td>Late Miocene</td>
            </tr>
        </tbody>

    </table>
</body>

</html>
