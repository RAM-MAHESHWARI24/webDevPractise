    <meta charset="UTF-8">

</head>

<body>
    <h1>Forms</h1>
    <form action="/search/">
        <p>
            <label for="username">Enter your username</label>
            <input type="text" placeholder="username eg Ramesh@123" id="username" name="username">
        </p>
        <p>
            <label>
                Enter Email
                <input type="email" placeholder="Email" name="email">
            </label>
        </p>
        <p>
            <label for="password"> Enter password</label>
            <input type="password" placeholder="password" id="password" name="password">
        </p>
        <label for="isMale">Are you Male</label>
        <input type="checkbox" id="isMale" name="isMale">

        <p>
            <button> Sumbit Form</button>

    <hr>
    <button>Outside of Form</button>
    <hr>
    <form action="https://www.reddit.com/search">
        <input type="text" name="q" id="">
        <button>Search Reddit</button>
    </form>
    <form action="https://www.google.com/search">
        <input type="text" name="q">
        <button>Search Google</button>
    </form>
    <form action="https://www.youtube.com/results">
        <input type="text" name="search_query">
        <button>Search youtube</button>
    </form>
    <!-- // radio groups together based on same "name" in same form tag -->
    <hr>
    <form action="/search">
        <label for="toc">I agree all TOC</label>
        <input type="checkbox" name="IsTocAgreed" id="toc" checked>
        <label for="small">Small S</label>
        <input type="radio" name="size" id="small" value="s">
        <label for="medium">Medium M</label>
        <input type="radio" name="size" id="medium" value="m">
        <label for="large">Large L</label>
        <input type="radio" name="size" id="large" value="l">
        <button>Submit Size form</button>

        <p>
            <label for="meal"> Select your meal</label>
            <select name="meal" id="meal">
                <option value="">Please Select an Option</option>
                <option value="veg">Vegetarian</option>
                <option value="non-veg">Non-Vegetarian</option>
                <option value="vegan" selected>Vegan</option>
            </select>
        </p>
        <p>
            <label for="Cheese">Adjust Cheese Level:</label>
            <input type="range" name="Cheese Level" id="Cheese" step="5.6" min="-898" max="100" defa>

        </p>
        <p>
        <h2>FeedBack Form</h2>
        <label for="feedback">Feedback label</label>
        <br>
        <textarea name="feedback" id="feedback" placeholder="Enter your feedback here : ....." rows="25"
            cols="25"></textarea>
        </p>
    </form>
    <hr>
    <form action="/validations">
        <label for="usernameN">Enter Username</label>
        <input type="text" name="username" id="usernameN" required>
        <label for="passwordN">Enter Password</label>
        <input type="password" minlength="5" maxlength="20" name="password" id="passwordN">
        <button>Submit</button>
    </form>

</body>

</html>
